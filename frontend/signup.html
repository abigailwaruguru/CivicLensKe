<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - CivicLens</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="navbar">
      <div class="navbar-title">CivicLens Campaign Finance Dashboard</div>
      <nav class="navbar-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <form id="signup-form" autocomplete="off" class="form-container">
        <fieldset>
          <legend>Sign Up</legend>
          <div class="form-group">
            <label for="signup-username">Username</label>
            <input id="signup-username" name="username" required>
          </div>
          <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input id="signup-email" name="email" type="email" required>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input id="signup-password" name="password" type="password" required>
          </div>
          <div class="form-group">
            <label for="signup-password2">Confirm Password</label>
            <input id="signup-password2" name="password2" type="password" required>
          </div>
          <button type="submit">Sign Up</button>
        </fieldset>
      </form>
      <p style="margin-top:1em;">Already have an account? <a href="login.html">Login here</a>.</p>
      <div id="signup-message"></div>
    </section>
  </main>
  <footer>
    <small>Built with CivicLens Campaign Finance Build Pack</small>
  </footer>
  <script src="signup.js"></script>
</body>
</html>
